          path: /v1/usage/lookup
          operation_id: log_lookup_v1_usage_lookup_post
        - method: POST
          path: /v1/usage/pdf-report-claim
          operation_id: claim_pdf_report_v1_usage_pdf_report_claim_post
        - method: GET
          path: /v1/usage
          operation_id: get_usage_v1_usage_get
