      api: fastdol
      operations:
        - method: POST
          path: /webhooks/stripe
          operation_id: stripe_webhook_tombstone_webhooks_stripe_post
  actions:
    - batch
    - claim
    - create
    - delete
    - download
    - forgot
    - get
    - health
    - industries
    - industry
    - list
    - log
    - login
    - logout
    - nursing
    - reset
    - revoke
    - rotate
    - search
    - signup
    - sitemap
    - state
    - states
    - stripe
    - submit
    - upload
    - verify
  schemas:
    core:
      - BatchLookupItem
      - BatchLookupRequest
      - ExportRequest
      - ExportFilters
      - FeedbackRequest
    auth:
      - SignupRequest
      - LoginRequest
      - VerifyEmailRequest
      - ForgotPasswordRequest
      - ResetPasswordRequest
      - DeleteAccountRequest
      - CreateKeyRequest
    upload:
      - Body_upload_csv_v1_employers_upload_csv_post
    errors:
      - HTTPValidationError
      - ValidationError
  parameters:
    pagination:
      - limit
      - offset
    identifiers:
      - activity_nr
      - ccn
      - ein
      - employer_id
      - job_id
      - key_id
    filters:
      - X-Api-Key
      - code
      - has_fatalities
      - indexable_only
      - naics
      - naics4
      - name
      - parent_name
      - parent_only
      - sort_by
      - sort_dir
      - state
      - state_code
      - svep
      - zip
  enums:
    agency:
      - OSHA
      - WHD
      - MSHA
      - EPA
      - NLRB
      - FMCSA
      - OFLC
      - BLS
      - SAMGov
      - CMS
      - USAspending
      - CPSC
      - NHTSA
      - SEC
      - UVA
    risk_level:
      - low
      - medium
      - high
      - critical
    export_format:
      - csv
      - json
  authentication:
    scheme: apiKey
    in: header
    name: X-Api-Key
    description: X-Api-Key header carrying a FastDOL key. Up to 5 active keys per account; rotation provides 48-hour grace.
capability:
  workflows:
    - name: Employer Compliance Research
      file: capabilities/employer-compliance-research.yaml
      description: Interactive cross-agency research across OSHA, WHD, EPA, MSHA, NLRB, SEC, SAM.gov, etc.
      apis_combined:
        - fastdol
      tool_count: 21
      personas:
        - journalist
        - esg-analyst
        - underwriter
        - compliance-officer
        - researcher
      domains:
        - employer-search
        - enforcement
        - risk
        - industry-benchmarks
        - state-stats
    - name: Bulk Data Pipelines
      file: capabilities/bulk-data-pipelines.yaml
      description: Batch lookups, CSV upload, async export jobs, usage telemetry, and API-key lifecycle for platform teams.
      apis_combined:
        - fastdol
      tool_count: 15
      personas:
        - data-engineer
        - platform-admin
        - devops
      domains:
        - batch-lookup
        - csv-upload
        - export-jobs
        - usage
        - api-key-management
  personas:
    - id: journalist
      name: Investigative Journalist
      description: Reporters investigating workplace safety, wage theft, or environmental violations.
    - id: esg-analyst
      name: ESG Analyst
      description: Investment analyst screening portfolios for labor and compliance risk.
    - id: underwriter
      name: Insurance Underwriter
      description: Workers comp / commercial casualty underwriting risk pricing.
    - id: compliance-officer
      name: Compliance Officer
      description: Corporate compliance benchmarking against industry peers.
    - id: researcher
      name: Academic Researcher
      description: Labor economists and public health researchers studying enforcement.
    - id: data-engineer
      name: Data Engineer
      description: Engineer running bulk enrichment pipelines.
    - id: platform-admin
      name: Platform Administrator
      description: Administrator managing accounts, keys, and quotas.
    - id: devops
      name: DevOps Engineer
      description: Engineer wiring API-key rotation, usage monitoring, and exports into CI/CD.
  domains:
    - employer-search
    - enforcement
    - risk
    - industry-benchmarks
    - state-stats
    - batch-lookup
    - csv-upload
    - export-jobs
    - usage
    - api-key-management
  namespaces:
    - kind: consumed
      name: fastdol
      baseUri: https://api.fastdol.com
    - kind: rest
      name: employer-compliance-research-api
      port: 8080
    - kind: mcp
      name: employer-compliance-research-mcp
      port: 9090
    - kind: rest
      name: bulk-data-pipelines-api
      port: 8081
    - kind: mcp
      name: bulk-data-pipelines-mcp
      port: 9091
  binds:
    - env: FASTDOL_API_KEY
      workflows:
        - employer-compliance-research
        - bulk-data-pipelines
