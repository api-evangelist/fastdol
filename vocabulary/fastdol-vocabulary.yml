vocabulary: 1.0.0
info:
  provider: FastDOL
  description: Vocabulary mapping the operational dimension (OpenAPI) and the capability dimension (Naftiko workflows) of the FastDOL federal workplace enforcement API.
  created: '2026-05-16'
  modified: '2026-05-16'
operational:
  apis:
    - name: FastDOL API
      namespace: fastdol
      version: '1.0'
      baseUrl: https://api.fastdol.com
      status: active
      operations: 47
  resources:
    - name: auth
      api: fastdol
      operations:
        - method: POST
          path: /auth/signup
          operation_id: signup_auth_signup_post
        - method: POST
          path: /auth/verify
          operation_id: verify_email_auth_verify_post
        - method: POST
          path: /auth/login
          operation_id: login_auth_login_post
        - method: POST
          path: /auth/logout
          operation_id: logout_auth_logout_post
        - method: GET
          path: /auth/me
          operation_id: get_me_auth_me_get
        - method: POST
          path: /auth/forgot-password
          operation_id: forgot_password_auth_forgot_password_post
        - method: POST
          path: /auth/reset-password
          operation_id: reset_password_auth_reset_password_post
    - name: dashboard
      api: fastdol
      operations:
        - method: GET
          path: /dashboard/plan
          operation_id: get_plan_dashboard_plan_get
        - method: GET
          path: /dashboard/keys
          operation_id: list_keys_dashboard_keys_get
        - method: POST
          path: /dashboard/keys
          operation_id: create_key_dashboard_keys_post
        - method: POST
          path: /dashboard/keys/{key_id}/rotate
          operation_id: rotate_key_dashboard_keys__key_id__rotate_post
        - method: DELETE
          path: /dashboard/keys/{key_id}
          operation_id: revoke_key_dashboard_keys__key_id__delete
        - method: DELETE
          path: /dashboard/account
          operation_id: delete_account_dashboard_account_delete
    - name: employers
      api: fastdol
      operations:
        - method: GET
          path: /v1/employers
          operation_id: search_employers_v1_employers_get
        - method: GET
          path: /v1/employers/parent
          operation_id: get_parent_company_v1_employers_parent_get
        - method: GET
          path: /v1/employers/ein/{ein}
          operation_id: get_employer_by_ein_v1_employers_ein__ein__get
        - method: GET
          path: /v1/employers/{employer_id}
          operation_id: get_employer_v1_employers__employer_id__get
        - method: GET
          path: /v1/employers/{employer_id}/inspections
          operation_id: get_inspections_v1_employers__employer_id__inspections_get
        - method: GET
          path: /v1/employers/{employer_id}/severe-injuries
          operation_id: get_severe_injuries_v1_employers__employer_id__severe_injuries_get
        - method: GET
          path: /v1/employers/{employer_id}/whd-cases
          operation_id: get_whd_cases_v1_employers__employer_id__whd_cases_get
        - method: GET
          path: /v1/employers/{employer_id}/osha-accidents
          operation_id: get_osha_accidents_v1_employers__employer_id__osha_accidents_get
        - method: GET
          path: /v1/employers/{employer_id}/sec-enforcement
          operation_id: get_sec_enforcement_v1_employers__employer_id__sec_enforcement_get
        - method: GET
          path: /v1/employers/{employer_id}/peers
          operation_id: get_peers_v1_employers__employer_id__peers_get
        - method: POST
          path: /v1/employers/batch
          operation_id: batch_lookup_v1_employers_batch_post
        - method: GET
          path: /v1/employers/{employer_id}/risk-history
