  exposes:
  - type: rest
    namespace: fastdol-rest
    port: 8080
    description: REST adapter for FastDOL API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/auth/forgot-password
      name: auth-forgot-password
      description: REST surface for auth-forgot-password.
      operations:
      - method: POST
        name: forgotpasswordauthforgotpasswordpost
        description: FastDOL Forgot Password
        call: fastdol.forgotpasswordauthforgotpasswordpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/login
      name: auth-login
      description: REST surface for auth-login.
      operations:
      - method: POST
        name: loginauthloginpost
        description: FastDOL Login
        call: fastdol.loginauthloginpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/logout
      name: auth-logout
      description: REST surface for auth-logout.
      operations:
      - method: POST
        name: logoutauthlogoutpost
        description: FastDOL Logout
        call: fastdol.logoutauthlogoutpost
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/me
      name: auth-me
      description: REST surface for auth-me.
      operations:
      - method: GET
        name: getmeauthmeget
        description: FastDOL GET Me
        call: fastdol.getmeauthmeget
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/reset-password
      name: auth-reset-password
      description: REST surface for auth-reset-password.
      operations:
      - method: POST
        name: resetpasswordauthresetpasswordpost
        description: FastDOL Reset Password
        call: fastdol.resetpasswordauthresetpasswordpost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth/signup
      name: auth-signup
      description: REST surface for auth-signup.
      operations:
      - method: POST
        name: signupauthsignuppost
        description: FastDOL Signup
        call: fastdol.signupauthsignuppost
