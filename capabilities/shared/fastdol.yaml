naftiko: "1.0.0-alpha1"

info:
  label: "FastDOL API"
  description: "Federal workplace enforcement records on 2.3M US employers across 16 federal agencies (OSHA, WHD, MSHA, EPA ECHO, NLRB, FMCSA, OFLC, BLS SOII, SAM.gov, CMS, USAspending, CPSC, NHTSA, SEC, UVA Corporate Prosecution Registry) exposed as a unified JSON API."
  tags:
    - FastDOL
    - OSHA
    - WHD
    - EPA
    - Federal Enforcement
    - Workplace Safety
    - Compliance
    - Public Records
  created: "2026-05-16"
  modified: "2026-05-16"

binds:
  - namespace: env
    keys:
      FASTDOL_API_KEY: FASTDOL_API_KEY

capability:
  consumes:
    - type: http
      namespace: fastdol
      baseUri: https://api.fastdol.com
      description: "FastDOL REST API base."
      authentication:
        type: apikey
        key: X-Api-Key
        value: "{{FASTDOL_API_KEY}}"
        placement: header
      resources:
        - name: employers
          path: /v1/employers
          description: "Employer search, profile lookup, batch lookup, and CSV upload."
          operations:
            - name: search-employers
              method: GET
              description: "Fuzzy search across 2.3M US employers by name, EIN, ZIP, state, or NAICS."
              inputParameters:
                - { name: name,   in: query, type: string,  required: false, description: "Fuzzy employer name search." }
                - { name: ein,    in: query, type: string,  required: false, description: "Exact EIN match." }
                - { name: state,  in: query, type: string,  required: false, description: "Two-letter US state code." }
                - { name: zip,    in: query, type: string,  required: false, description: "US ZIP code." }
                - { name: naics,  in: query, type: string,  required: false, description: "NAICS code filter." }
                - { name: limit,  in: query, type: integer, required: false, description: "Page size (1-100, default 20)." }
                - { name: offset, in: query, type: integer, required: false, description: "Result offset." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-parent-company
              method: GET
              description: "Aggregate enforcement rollup for a parent company across all locations."
              inputParameters:
                - { name: parent_name, in: query, type: string, required: true, description: "Normalized parent-company slug (e.g. walmart-inc)." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-employer-by-ein
              method: GET
              description: "Look up an employer by exact EIN."
              inputParameters:
                - { name: ein, in: path, type: string, required: true, description: "Employer Identification Number." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-employer
              method: GET
              description: "Get an employer's full cross-agency profile."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL internal employer ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-inspections
              method: GET
              description: "List OSHA inspections for an employer."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL employer ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-severe-injuries
              method: GET
              description: "List OSHA severe-injury reports for an employer."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL employer ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-whd-cases
              method: GET
              description: "List WHD (Wage and Hour Division) cases for an employer."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL employer ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-osha-accidents
              method: GET
              description: "List OSHA accidents for an employer."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL employer ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-sec-enforcement
              method: GET
              description: "List SEC enforcement actions for the employer's public-company parent."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL employer ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-peers
              method: GET
              description: "List peer employers within the same NAICS code and state."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL employer ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-risk-history
              method: GET
              description: "Return month-over-month risk-score history for an employer."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL employer ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: batch-lookup
              method: POST
              description: "Submit up to 100 employer queries in a single batch."
              inputParameters: []
              body:
                type: json
                data:
                  items: "{{tools.items}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: upload-csv
              method: POST
              description: "Upload a CSV (up to 500 rows / 5MB) for bulk match against the employer index."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: submit-feedback
              method: POST
              description: "Submit a per-employer feedback/correction request."
              inputParameters:
                - { name: employer_id, in: path, type: string, required: true, description: "FastDOL employer ID." }
              body:
                type: json
                data:
                  message: "{{tools.message}}"
                  category: "{{tools.category}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: inspections
          path: /v1/inspections
          description: "OSHA inspection violation detail."
          operations:
            - name: get-violations
              method: GET
              description: "Return citation-level violations for an OSHA inspection activity number."
              inputParameters:
                - { name: activity_nr, in: path, type: string, required: true, description: "OSHA inspection activity number." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: industries
          path: /v1/industries
          description: "NAICS industry metadata."
          operations:
            - name: list-naics-codes
              method: GET
              description: "List all known NAICS codes."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-industry
              method: GET
              description: "Get industry metadata and BLS SOII benchmark for a NAICS-4 code."
              inputParameters:
                - { name: naics4, in: path, type: string, required: true, description: "Four-digit NAICS code." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: stats
          path: /v1/stats
          description: "Pre-aggregated state, industry, and nursing-home statistics."
          operations:
            - name: state-stats
              method: GET
              description: "Aggregate enforcement stats for a US state."
              inputParameters:
                - { name: code, in: path, type: string, required: true, description: "Two-letter US state code." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: industry-stats
              method: GET
              description: "Aggregate enforcement stats for a NAICS code."
              inputParameters:
                - { name: naics, in: path, type: string, required: true, description: "NAICS code." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: industries-index
              method: GET
              description: "Index of industries with aggregate enforcement stats."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: nursing-home-detail
              method: GET
              description: "Detail for a single CMS nursing-home CCN."
              inputParameters:
                - { name: ccn, in: path, type: string, required: true, description: "CMS Certification Number." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: nursing-homes-by-state
              method: GET
              description: "Nursing homes for a US state."
              inputParameters:
                - { name: state_code, in: path, type: string, required: true, description: "Two-letter US state code." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: nursing-homes-index
              method: GET
              description: "Top-level index of nursing homes."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: states-index
              method: GET
              description: "Index of US states with aggregate enforcement stats."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: export
          path: /v1/export
          description: "Async bulk export jobs (Enterprise)."
          operations:
            - name: create-export
              method: POST
              description: "Create an async bulk export job (up to 100,000 rows)."
              inputParameters: []
              body:
                type: json
                data:
                  filters: "{{tools.filters}}"
                  format: "{{tools.format}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-export
              method: GET
              description: "Get an export job's status."
              inputParameters:
                - { name: job_id, in: path, type: string, required: true, description: "Export job ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: download-export
              method: GET
              description: "Download the file for a completed export job."
              inputParameters:
                - { name: job_id, in: path, type: string, required: true, description: "Export job ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: usage
          path: /v1/usage
          description: "Usage telemetry and PDF report claim."
          operations:
            - name: log-lookup
              method: POST
              description: "Log a downstream lookup event for usage attribution."
              inputParameters: []
              body:
                type: json
                data:
                  employer_id: "{{tools.employer_id}}"
                  context: "{{tools.context}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: claim-pdf-report
              method: POST
              description: "Claim generation of a PDF compliance report."
              inputParameters: []
              body:
                type: json
                data:
                  employer_id: "{{tools.employer_id}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-usage
              method: GET
              description: "Get current per-key usage and quota state."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: sitemap
          path: /v1/sitemap
          description: "SEO sitemap feeds."
          operations:
            - name: sitemap-employers
              method: GET
              description: "Crawler-friendly employer sitemap."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: health
          path: /v1/health
          description: "Service health endpoints."
          operations:
            - name: health
              method: GET
              description: "Lightweight liveness check."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: health-detail
              method: GET
              description: "Detailed health and dependency status."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: dashboard
          path: /dashboard
          description: "Account, plan, and API key self-service."
          operations:
            - name: get-plan
              method: GET
              description: "Return the current account plan and quota."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: list-keys
              method: GET
              description: "List API keys on the account."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: create-key
              method: POST
              description: "Create a new API key."
              inputParameters: []
              body:
                type: json
                data:
                  label: "{{tools.label}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: rotate-key
              method: POST
              description: "Rotate an API key with a 48-hour grace period."
              inputParameters:
                - { name: key_id, in: path, type: string, required: true, description: "API key ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: revoke-key
              method: DELETE
              description: "Revoke an API key immediately."
              inputParameters:
                - { name: key_id, in: path, type: string, required: true, description: "API key ID." }
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: delete-account
              method: DELETE
              description: "Delete the FastDOL account."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

        - name: auth
          path: /auth
          description: "Authentication endpoints (signup, login, password)."
          operations:
            - name: signup
              method: POST
              description: "Sign up for a FastDOL account."
              inputParameters: []
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  password: "{{tools.password}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: verify-email
              method: POST
              description: "Verify account email."
              inputParameters: []
              body:
                type: json
                data:
                  token: "{{tools.token}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: login
              method: POST
              description: "Log in to FastDOL."
              inputParameters: []
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  password: "{{tools.password}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: logout
              method: POST
              description: "Log out of FastDOL."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: get-me
              method: GET
              description: "Get the current authenticated user."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: forgot-password
              method: POST
              description: "Trigger a password-reset email."
              inputParameters: []
              body:
                type: json
                data:
                  email: "{{tools.email}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }

            - name: reset-password
              method: POST
              description: "Complete a password reset."
              inputParameters: []
              body:
                type: json
                data:
                  token: "{{tools.token}}"
                  new_password: "{{tools.new_password}}"
              outputRawFormat: json
              outputParameters:
                - { name: result, type: object, value: "$." }
