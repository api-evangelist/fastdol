          description: Successful Response
          content:
            application/json:
              schema: {}
              examples:
                GetWhdCasesV1EmployersEmployerIdWhdCasesGet200Example:
                  summary: Default GetWhdCasesV1EmployersEmployerIdWhdCasesGet 200 response
                  x-microcks-default: true
                  value: string
        '422':
