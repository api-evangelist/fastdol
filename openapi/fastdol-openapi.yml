        prevent XSS / CSRF / session-theft\nescalating into full account wipe, plus an explicit \"DELETE\" confirmation\nstring to defeat accidental or malicious one-click destruction.\n\nCascades (via
        existing FKs in migrations/001_init + 002_add_constraints):\n  - api_keys, email_verifications, password_reset_tokens, subscriptions,\n    batch_jobs — ON DELETE CASCADE\n  - api_key_audit_log,
        api_usage — customer_id set to NULL (we keep the\n    audit/usage trail; the PII linkage is severed)\n  - audit_log — customer_id set to NULL (same rationale)\n\nNote: the customers table still
        carries a vestigial `stripe_customer_id`\ncolumn from when paid tiers were self-serve via Stripe. The column is\nnot selected here — Stripe was retired in the May 2026 redesign and\ncommercial accounts
        are now handled out-of-band. If we ever need the\nhistorical mapping back, it's still in the DB row; we just don't surface\nit from this delete flow."
