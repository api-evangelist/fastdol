components:
  schemas:
    BatchLookupItem:
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        ein:
          anyOf:
          - type: string
          - type: 'null'
          title: Ein
        employer_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Employer Id
        state:
          anyOf:
          - type: string
          - type: 'null'
          title: State
        zip:
          anyOf:
          - type: string
          - type: 'null'
          title: Zip
        city:
          anyOf:
          - type: string
          - type: 'null'
          title: City
      type: object
      title: BatchLookupItem
    BatchLookupRequest:
      properties:
        lookups:
          items:
            $ref: '#/components/schemas/BatchLookupItem'
          type: array
          title: Lookups
      type: object
      required:
      - lookups
      title: BatchLookupRequest
    Body_upload_csv_v1_employers_upload_csv_post:
      properties:
        file:
          type: string
          format: binary
          title: File
          description: CSV file with employer names and optional location fields
          example: string
      type: object
      required:
      - file
      title: Body_upload_csv_v1_employers_upload_csv_post
    CreateKeyRequest:
      properties:
        label:
          type: string
          title: Label
          default: default
          example: string
        scopes:
          items:
            type: string
          type: array
          title: Scopes
          default:
          - employer:read
      type: object
      title: CreateKeyRequest
    DeleteAccountRequest:
      properties:
        password:
          type: string
          title: Password
          example: CorrectHorseBatteryStaple1!
        confirm:
          type: string
          title: Confirm
          example: string
      type: object
      required:
      - password
      - confirm
      title: DeleteAccountRequest
    ExportFilters:
      properties:
        name:
          anyOf:
          - type: string
            maxLength: 200
          - type: 'null'
          title: Name
        ein:
          anyOf:
          - type: string
            maxLength: 20
          - type: 'null'
          title: Ein
        state:
          anyOf:
          - type: string
            maxLength: 2
          - type: 'null'
          title: State
        states:
          anyOf:
          - items:
              type: string
            type: array
            maxItems: 60
          - type: 'null'
          title: States
        zip:
          anyOf:
          - type: string
            maxLength: 5
          - type: 'null'
          title: Zip
        naics:
          anyOf:
          - type: string
            maxLength: 6
          - type: 'null'
          title: Naics
          description: Single NAICS prefix, 2-6 digits
        naics_codes:
          anyOf:
          - items:
              type: string
            type: array
            maxItems: 50
          - type: 'null'
          title: Naics Codes
          description: Multiple NAICS prefixes (OR)
        parent_only:
          type: boolean
          title: Parent Only
          default: false
          example: false
        parent_name:
          anyOf:
          - type: string
            maxLength: 200
          - type: 'null'
          title: Parent Name
        has_fatalities:
          type: boolean
          title: Has Fatalities
          default: false
          example: false
        svep:
          type: boolean
          title: Svep
          default: false
          example: false
        min_inspections:
          anyOf:
          - type: integer
