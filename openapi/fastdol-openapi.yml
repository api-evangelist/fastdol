openapi: 3.0.2
info:
  title: FastDOL API
  version: '1.0'
  description: FastDOL aggregates federal workplace enforcement records on 2.3M US employers across 16 federal agencies — OSHA, WHD, MSHA, EPA ECHO, NLRB, FMCSA, OFLC, BLS SOII, SAM.gov, CMS, 
    USAspending, CPSC, NHTSA, SEC, and the UVA Corporate Prosecution Registry. Query inspections, violations, penalties, wage theft cases, severe injury reports, recalls, and federal contract awards 
    via a single, normalized JSON API.
  contact:
    name: FastDOL Support
    email: ben@fastdol.com
    url: https://fastdol.com/enterprise
  termsOfService: https://fastdol.com/terms
paths:
  /v1/employers:
    get:
      summary: FastDOL Search Employers
      description: 'Search employers by name, EIN, zip, state, or NAICS.


        Returns a flat list of employer locations sorted by risk score (worst first).

        Each result includes `related_locations_count` showing how many locations

        share the same normalized employer name — useful for national chains.'
      operationId: search_employers_v1_employers_get
      parameters:
      - name: name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 200
          - type: 'null'
          description: Fuzzy employer name search
          title: Name
        description: Fuzzy employer name search
        example: Acme Construction Inc
      - name: ein
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 12
          - type: 'null'
          description: Exact EIN match
          title: Ein
        description: Exact EIN match
        example: 12-3456789
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 2
          - type: 'null'
          description: State code filter (e.g., CA)
          title: State
        description: State code filter (e.g., CA)
        example: CA
      - name: zip
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 10
          - type: 'null'
          description: 5-digit zip code filter
          title: Zip
        description: 5-digit zip code filter
        example: '94105'
      - name: naics
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 6
          - type: 'null'
          description: 4-digit NAICS prefix filter
          title: Naics
        description: 4-digit NAICS prefix filter
        example: '2362'
      - name: parent_only
        in: query
        required: false
        schema:
          type: boolean
          description: Only return employers with a parent_name (known parent companies)
          default: false
          title: Parent Only
        description: Only return employers with a parent_name (known parent companies)
        example: false
      - name: parent_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 200
          - type: 'null'
          description: Filter to locations under a specific parent company (exact match)
          title: Parent Name
        description: Filter to locations under a specific parent company (exact match)
        example: walmart-inc
      - name: has_fatalities
        in: query
        required: false
        schema:
          type: boolean
          description: Filter to locations with fatality investigations
          default: false
          title: Has Fatalities
        description: Filter to locations with fatality investigations
        example: false
      - name: svep
        in: query
        required: false
        schema:
          type: boolean
          description: Filter to locations on the Severe Violator Enforcement Program
          default: false
          title: Svep
        description: Filter to locations on the Severe Violator Enforcement Program
        example: false
      - name: sort_by
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 20
          - type: 'null'
          description: 'Sort results by: risk_score (default), violations, penalties, inspections, fatalities'
          title: Sort By
        description: 'Sort results by: risk_score (default), violations, penalties, inspections, fatalities'
        example: string
      - name: sort_dir
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            maxLength: 4
          - type: 'null'
          description: 'Sort direction: desc (default) or asc'
          title: Sort Dir
        description: 'Sort direction: desc (default) or asc'
        example: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
        example: 20
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
        example: 0
      - name: X-Api-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
        example: string
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
              examples:
                SearchEmployersV1EmployersGet200Example:
                  summary: Default SearchEmployersV1EmployersGet 200 response
                  x-microcks-default: true
                  value: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
              examples:
                SearchEmployersV1EmployersGet422Example:
                  summary: Default SearchEmployersV1EmployersGet 422 response
                  x-microcks-default: true
                  value:
                    detail:
                    - loc:
                      - string
                      msg: string
                      type: string
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /v1/employers/parent:
    get:
      summary: FastDOL GET Parent Company
      description: 'Parent company risk rollup — aggregate risk across all locations.


        Returns company-wide statistics (total inspections, violations, penalties,

        risk distribution) plus a paginated list of individual locations sorted

        by risk score (worst first).


        Premium feature for enterprise customers evaluating national employers.'
      operationId: get_parent_company_v1_employers_parent_get
      parameters:
      - name: name
        in: query
        required: true
        schema:
          type: string
          description: Parent company name (e.g., 'Amazon', 'Walmart')
          title: Name
        description: Parent company name (e.g., 'Amazon', 'Walmart')
        example: Acme Construction Inc
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter locations by state
          title: State
        description: Filter locations by state
        example: CA
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
        example: 20
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
        example: 0
      - name: X-Api-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
        example: string
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
              examples:
                GetParentCompanyV1EmployersParentGet200Example:
                  summary: Default GetParentCompanyV1EmployersParentGet 200 response
                  x-microcks-default: true
